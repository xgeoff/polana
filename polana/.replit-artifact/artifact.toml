kind = "web"
previewPath = "/polana/"
title = "Polana"
version = "1.0.0"
id = "artifacts/polana"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/polana/" ]
localPort = 24041

[services.development]
run = "pnpm --filter @workspace/polana run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/polana", "run", "build" ]
publicDir = "artifacts/polana/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24041"
BASE_PATH = "/polana/"
